<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Bishal Lamichhane</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: oklch(0.985 0.002 80);
    color: rgba(42, 44, 56, 0.9);
  }
  .host-toolbar {
    height: 72px;
    padding: 0 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    border-bottom: 1px solid rgba(42, 44, 56, 0.12);
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(250, 248, 243, 0.9));
    backdrop-filter: blur(18px);
    flex: 0 0 auto;
  }
  .toolbar-side,
  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .toolbar-group.divided {
    padding-left: 16px;
    border-left: 1px solid rgba(42, 44, 56, 0.12);
  }
  .toolbar-btn,
  .toolbar-toggle {
    appearance: none;
    border: 1px solid rgba(42, 44, 56, 0.16);
    background: rgba(255, 252, 247, 0.82);
    color: inherit;
    font: inherit;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 40px;
    padding: 0 12px;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition:
      background .16s ease,
      border-color .16s ease,
      color .16s ease,
      opacity .16s ease;
  }
  .toolbar-btn {
    opacity: 0.82;
  }
  .toolbar-segmented {
    display: inline-flex;
    align-items: stretch;
    border: 1px solid rgba(42, 44, 56, 0.16);
    background: rgba(255, 252, 247, 0.82);
  }
  .toolbar-segmented .toolbar-btn {
    min-height: 40px;
    border: 0;
    border-right: 1px solid rgba(42, 44, 56, 0.12);
    background: transparent;
  }
  .toolbar-segmented .toolbar-btn:last-child {
    border-right: 0;
  }
  .toolbar-btn:hover,
  .toolbar-toggle:hover {
    opacity: 1;
    border-color: rgba(42, 44, 56, 0.28);
    background: rgba(255, 255, 255, 0.94);
  }
  .toolbar-segmented:hover {
    border-color: rgba(42, 44, 56, 0.28);
    background: rgba(255, 255, 255, 0.94);
  }
  .toolbar-segmented .toolbar-btn:hover {
    background: rgba(255, 255, 255, 0.7);
  }
  .toolbar-btn.is-on {
    opacity: 1;
    font-weight: 600;
    color: oklch(0.985 0.002 80);
    border-color: rgba(42, 44, 56, 0.92);
    background: rgba(42, 44, 56, 0.9);
  }
  .toolbar-btn svg,
  .toolbar-toggle svg {
    width: 16px;
    height: 16px;
    display: block;
  }
  .toolbar-toggle {
    gap: 10px;
    opacity: 0.9;
    font-weight: 500;
  }
  .toolbar-toggle.is-on {
    color: oklch(0.985 0.002 80);
    border-color: rgba(42, 44, 56, 0.92);
    background: rgba(42, 44, 56, 0.9);
  }
  .toolbar-switch {
    position: relative;
    width: 14px;
    height: 14px;
    border: 1px solid currentColor;
    background: transparent;
    transition:
      background .18s ease,
      border-color .18s ease;
  }
  .toolbar-switch::after {
    content: "";
    position: absolute;
    inset: 2px;
    background: currentColor;
    opacity: 0;
    transition: opacity .18s ease;
  }
  .toolbar-toggle.is-on .toolbar-switch {
    background: transparent;
  }
  .toolbar-toggle.is-on .toolbar-switch::after {
    opacity: 1;
  }
  .toolbar-zoom {
    opacity: 0.75;
    font-weight: 500;
  }
  .host-page-link {
    position: fixed;
    left: 50%;
    bottom: 16px;
    transform: translateX(-50%);
    z-index: 5;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border: 1px solid rgba(42, 44, 56, 0.18);
    background: rgba(255, 252, 247, 0.84);
    color: rgba(42, 44, 56, 0.9);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    transition:
      transform .16s ease,
      background .16s ease,
      border-color .16s ease,
      box-shadow .16s ease;
  }
  .host-page-link:hover {
    transform: translateX(-50%) translateY(-1px);
    background: rgba(255, 255, 255, 0.95);
    border-color: rgba(42, 44, 56, 0.32);
    box-shadow: 0 14px 28px rgba(0, 0, 0, 0.12);
  }
  .host-page-link .sub {
    opacity: 0.56;
    letter-spacing: 0.04em;
    text-transform: none;
  }
  #root {
    width: 100vw;
    flex: 1 1 auto;
    min-height: 0;
  }
  @media (max-width: 960px) {
    .host-toolbar {
      padding: 0 12px;
      gap: 10px;
    }
    .toolbar-group {
      gap: 10px;
    }
    .toolbar-group.divided {
      padding-left: 10px;
    }
    .toolbar-segmented .toolbar-btn {
      min-height: 36px;
      padding: 0 10px;
    }
    .toolbar-label-hide {
      display: none;
    }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="host-toolbar">
  <div class="toolbar-side">
    <button class="toolbar-btn" id="toolbar-refresh" type="button" aria-label="Reload">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3.3 8a4.7 4.7 0 1 0 1.4-3.3"/>
        <path d="M3.4 2.8v2.8h2.8"/>
      </svg>
    </button>
  </div>

  <div class="toolbar-side">
    <button class="toolbar-toggle" id="toolbar-tweaks" type="button" aria-pressed="false">
      <span>Controls</span>
      <span class="toolbar-switch" aria-hidden="true"></span>
    </button>

    <div class="toolbar-group divided">
      <div class="toolbar-segmented" role="group" aria-label="Interaction mode">
        <button class="toolbar-btn is-on" id="toolbar-mode-draw" type="button" aria-pressed="true" title="Draw obstacles in Farm view.">
          <span>Draw</span>
        </button>
        <button class="toolbar-btn" id="toolbar-mode-pilot" type="button" aria-pressed="false" title="Select an agent and guide it with the keyboard.">
          <span>Pilot</span>
        </button>
        <button class="toolbar-btn" id="toolbar-mode-hybrid" type="button" aria-pressed="false" title="Use pilot selection and drawing together.">
          <span>Pilot + Draw</span>
        </button>
      </div>
      <span class="toolbar-zoom">100%</span>
    </div>
  </div>
</div>
<div id="root"></div>
<a
  class="host-page-link"
  href="./research.html"
>
  <span>Homepage ↗</span>
</a>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="farm-tweaks-panel.js"></script>
<script type="text/babel" src="farm-themes.js"></script>
<script type="text/babel" src="farm-sim.js"></script>
<script type="text/babel" src="farm-chrome.js"></script>
<script type="text/babel" src="farm-hud.js"></script>
<script type="text/babel" src="farm-renderer.js"></script>
<script type="text/babel" src="farm-app.js"></script>
<script>
  (() => {
    const tweaksButton = document.getElementById('toolbar-tweaks');
    const refreshButton = document.getElementById('toolbar-refresh');
    const modeButtons = {
      draw: document.getElementById('toolbar-mode-draw'),
      pilot: document.getElementById('toolbar-mode-pilot'),
      hybrid: document.getElementById('toolbar-mode-hybrid'),
    };
    window.__agentFarmHostState = {
      interactionMode: 'draw',
      drawEnabled: true,
      pilotEnabled: false,
    };
    let tweaksOpen = false;

    const syncTweaks = (open) => {
      tweaksOpen = open;
      tweaksButton.classList.toggle('is-on', open);
      tweaksButton.setAttribute('aria-pressed', open ? 'true' : 'false');
    };

    const syncInteractionMode = (mode) => {
      const interactionMode = mode === 'pilot' || mode === 'hybrid' ? mode : 'draw';
      const drawEnabled = interactionMode === 'draw' || interactionMode === 'hybrid';
      const pilotEnabled = interactionMode === 'pilot' || interactionMode === 'hybrid';
      window.__agentFarmHostState.interactionMode = interactionMode;
      window.__agentFarmHostState.drawEnabled = drawEnabled;
      window.__agentFarmHostState.pilotEnabled = pilotEnabled;
      for (const [key, button] of Object.entries(modeButtons)) {
        const active = key === interactionMode;
        button.classList.toggle('is-on', active);
        button.setAttribute('aria-pressed', active ? 'true' : 'false');
      }
      window.dispatchEvent(new CustomEvent('agent-farm-draw-change', {
        detail: { drawEnabled, interactionMode, pilotEnabled }
      }));
      window.dispatchEvent(new CustomEvent('agent-farm-interaction-mode-change', {
        detail: { drawEnabled, interactionMode, pilotEnabled }
      }));
    };

    tweaksButton.addEventListener('click', () => {
      syncTweaks(!tweaksOpen);
      window.postMessage({
        type: tweaksOpen ? '__activate_edit_mode' : '__deactivate_edit_mode'
      }, '*');
    });

    refreshButton.addEventListener('click', () => {
      window.location.reload();
    });

    modeButtons.draw.addEventListener('click', () => syncInteractionMode('draw'));
    modeButtons.pilot.addEventListener('click', () => syncInteractionMode('pilot'));
    modeButtons.hybrid.addEventListener('click', () => syncInteractionMode('hybrid'));

    window.addEventListener('message', (event) => {
      const type = event?.data?.type;
      if (type === '__edit_mode_dismissed' || type === '__deactivate_edit_mode') {
        syncTweaks(false);
      }
      if (type === '__activate_edit_mode') {
        syncTweaks(true);
      }
    });

    syncInteractionMode('draw');
  })();
</script>
</body>
</html>

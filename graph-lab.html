<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Graph Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&amp;family=Geist+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./module-pages.css" />
</head>
<body>
  <div class="module-shell">
    <header class="module-toolbar">
      <a class="toolbar-link" href="./index.html">Back to Home</a>
      <div class="toolbar-center">
        <span class="toolbar-title">Graph Lab</span>
        <span class="toolbar-subtitle">Pairwise Comparison / Batch Statistics</span>
      </div>
      <a class="toolbar-chip" href="./research.html">Research Page</a>
    </header>

    <main class="module-main">
      <section class="surface-panel graphlab-panel">
        <div class="panel-head">
          <span>Graph Comparison</span>
          <span id="graphlab-caption">loading pair</span>
        </div>

        <div class="graphlab-frame">
          <div class="graphlab-visual-column">
            <div class="graphlab-compare-grid">
              <article class="graphlab-graph-card">
                <div class="graphlab-graph-head">
                  <span>Graph A</span>
                  <span id="graph-a-subtitle">--</span>
                </div>
                <div class="mini-graph-stage">
                  <svg id="graph-a-canvas" viewBox="0 0 480 400" aria-label="Graph A canvas"></svg>
                </div>
              </article>

              <article class="graphlab-graph-card">
                <div class="graphlab-graph-head">
                  <span>Graph B</span>
                  <span id="graph-b-subtitle">--</span>
                </div>
                <div class="mini-graph-stage">
                  <svg id="graph-b-canvas" viewBox="0 0 480 400" aria-label="Graph B canvas"></svg>
                </div>
              </article>
            </div>

            <div class="graphlab-distribution-row">
              <article class="graphlab-distribution-card">
                <p class="panel-label">Batch Distribution</p>
                <div class="status-line">
                  <span class="status-chip" id="batch-stat-chip">Edge count</span>
                  <span class="status-chip" id="batch-count-chip">80 samples</span>
                </div>
                <div class="distribution-stage">
                  <svg id="distribution-canvas" viewBox="0 0 960 220" aria-label="Batch distribution chart"></svg>
                </div>
              </article>

              <article class="graphlab-distribution-card log-card graphlab-summary-card">
                <p class="panel-label">Batch Summary</p>
                <ul class="summary-list" id="batch-summary">
                  <li>Loading batch summary.</li>
                </ul>
              </article>
            </div>
          </div>

          <aside class="graphlab-sidebar">
            <article class="compact-card control-card">
              <p class="panel-label">Pair Settings</p>

              <label>
                <span class="select-line"><span>Graph A</span><span class="range-value" id="graph-a-model-label">Erdos-Renyi</span></span>
                <select id="graph-a-model">
                  <option value="er">Erdos-Renyi</option>
                  <option value="sbm">Stochastic block model</option>
                  <option value="lattice">Ring lattice</option>
                </select>
              </label>

              <label>
                <span class="range-line"><span>A density</span><span class="range-value" id="graph-a-density-value">28%</span></span>
                <input id="graph-a-density" type="range" min="12" max="60" step="1" value="28" />
              </label>

              <label>
                <span class="select-line"><span>Graph B</span><span class="range-value" id="graph-b-model-label">Stochastic Block Model</span></span>
                <select id="graph-b-model">
                  <option value="er">Erdos-Renyi</option>
                  <option value="sbm" selected>Stochastic block model</option>
                  <option value="lattice">Ring lattice</option>
                </select>
              </label>

              <label>
                <span class="range-line"><span>B density</span><span class="range-value" id="graph-b-density-value">28%</span></span>
                <input id="graph-b-density" type="range" min="12" max="60" step="1" value="28" />
              </label>

              <label>
                <span class="range-line"><span>Nodes</span><span class="range-value" id="graph-node-count-value">16</span></span>
                <input id="graph-node-count" type="range" min="10" max="26" step="1" value="16" />
              </label>

              <div class="button-row">
                <button class="module-button primary" id="graph-regenerate-pair" type="button">Regenerate Pair</button>
                <button class="module-button" id="graph-run-batch" type="button">Resample Batch</button>
              </div>
            </article>

            <article class="compact-card control-card">
              <p class="panel-label">Batch Settings</p>

              <label>
                <span class="range-line"><span>Samples</span><span class="range-value" id="batch-sample-count-value">80</span></span>
                <input id="batch-sample-count" type="range" min="24" max="180" step="4" value="80" />
              </label>

              <label>
                <span class="select-line"><span>Statistic</span><span class="range-value" id="batch-stat-label">Edge count</span></span>
                <select id="batch-statistic">
                  <option value="edgeCount">Edge count</option>
                  <option value="density">Density</option>
                  <option value="components">Components</option>
                  <option value="avgDegree">Average degree</option>
                  <option value="avgPath">Average path</option>
                  <option value="clustering">Clustering</option>
                  <option value="triangles">Triangles</option>
                </select>
              </label>
            </article>

            <article class="compact-card log-card">
              <p class="panel-label">Comparison</p>
              <ul class="distance-list" id="pair-summary">
                <li>Loading comparison.</li>
              </ul>
            </article>
          </aside>
        </div>
      </section>
    </main>
  </div>

  <script src="./graph-lab.js"></script>
</body>
</html>
